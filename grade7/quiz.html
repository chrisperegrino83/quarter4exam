<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grade 7 - VE Assessment</title>
    <link rel="stylesheet" href="../style.css?v=1.1.1"> <!-- Links to the main CSS file -->
</head>
<body>
    <div id="top-right-ui">
        <span id="student-name-badge" class="name-badge"></span>
        <button id="bg-toggle" class="fab" title="Change Background">BG</button>
        <button id="theme-toggle" class="fab" title="Switch to Dark">☾</button>
    </div>
    <div id="loader-overlay">
        <div class="spinner"></div>
        <div class="loader-text">Loading…</div>
    </div>
    <div class="container">
        <img src="../assets/ulhs-logo.png" alt="School Logo" class="school-logo" />
        <div id="question-wrapper" class="question-container-fade">
            <h2 id="question">Please wait...</h2>
            <div id="options-container"></div>
        </div>
        <p id="score-display" style="display: none;">Score: 0</p>
        <a href="../index.html" class="btn btn-home">Back to Menu</a>
    </div>
    <footer class="app-footer">© 2026 Sir Chris | Version: <span id="app-version"></span></footer>

    <!-- Local Data Files (Serverless Support) -->
    <script src="students-list.js?v=1.1.1"></script>
    <script src="exam-questions.js?v=1.1.1"></script>
    <script src="answer-key.js?v=1.1.1"></script>

    <!-- Firebase SDK (Version 8.x for compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Firebase Configuration and Service (Local) -->
    <script src="../firebase-config.js?v=1.1.1"></script>
    <script src="../firebase-service.js?v=1.1.1"></script>

    <!-- Initialize Firebase (Only if config is set) -->
    <script>
      if (typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey !== 'YOUR_API_KEY') {
        firebase.initializeApp(firebaseConfig);
        console.log("Firebase initialized successfully.");
      } else {
        console.warn("Firebase configuration is not set. Please update firebase-config.js.");
      }
    </script>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="script.js?v=1.1.1"></script>
</body>
</html>
