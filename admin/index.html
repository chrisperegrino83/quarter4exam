<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Assessment Portal</title>
    <link rel="icon" type="image/png" href="../assets/ulhs-logo.png">
    <link rel="stylesheet" href="../style.css?v=1.4.1">
    <style>
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .login-form input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../assets/ulhs-logo.png" alt="School Logo" class="school-logo" />
        <h1>Admin Login <br><p style="font-size: 14px;">(for Sir Chris only)</p></h1>
        <div class="login-form">
            <input type="password" id="password" placeholder="Enter Admin Password" autofocus>
            <p id="error" class="error-msg">Incorrect password. Please try again.</p>
            <button id="login-btn" class="btn g7">Login</button>
        </div>
        <a href="../index.html" style="display: block; margin-top: 20px; color: #666; text-decoration: none;">Back to Home</a>
    </div>
    <footer class="app-footer">© 2026 Sir Chris | Version 1.4.1</footer>

    <script>
        const passInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error');

        /**
         * Hashes a string using SHA-256 (a one-way cryptographic hash).
         * Unlike Base64, this CANNOT be decoded back into the original password.
         */
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function doLogin() {
            const inputHash = await sha256(passInput.value);
            
            // The SHA-256 hash of the admin password.
            // This is "one-way", meaning it's mathematically impossible to reverse this 
            // string back into the original password easily.
            const _k = "240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9";

            if (inputHash === _k) {
                sessionStorage.setItem('admin_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.style.display = 'block';
                passInput.value = '';
                passInput.focus();
            }
        }

        loginBtn.addEventListener('click', doLogin);
        passInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
