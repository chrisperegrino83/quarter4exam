<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Assessment Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .dashboard-container {
            max-width: 800px;
            width: 95%;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .section:last-child {
            border-bottom: none;
        }
        .admin-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-align: left;
        }
        .form-group label {
            font-weight: bold;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card h3 {
            margin: 0;
            font-size: 1.5rem;
            color: #2c3e50;
        }
        .stat-card p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        th, td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: left;
        }
        th {
            background: #f8f9fa;
        }
        .logout-btn {
            background-color: #7f8c8d;
            margin-top: 20px;
        }
        .reset-btn {
            background-color: #e74c3c;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .reset-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .reset-select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .delete-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .delete-btn:hover {
            filter: brightness(1.1);
        }
        .results-table-container {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <script>
        if (sessionStorage.getItem('admin_auth') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>

    <div class="dashboard-container">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="../assets/ulhs-logo.png" alt="School Logo" style="width: 80px;" />
            <h1>Admin Dashboard</h1>
        </div>

        <div class="section">
            <h2>Download Results</h2>
            <p>Export all exam results to a single Excel file.</p>
            <button id="download-btn" class="btn g10">Download Summary Results (Excel)</button>
        </div>

        <div class="section">
            <h2>Add Student</h2>
            <div class="admin-controls">
                <div class="form-group">
                    <label for="student-name">Student Full Name</label>
                    <input type="text" id="student-name" placeholder="Enter student name">
                </div>
                <div class="form-group">
                    <label for="grade-level">Grade Level</label>
                    <select id="grade-level">
                        <option value="7">Grade 7</option>
                        <option value="8">Grade 8</option>
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                    </select>
                </div>
                <button id="add-student-btn" class="btn g7">Add Student to List</button>
                <button id="download-list-btn" class="btn g8" style="margin-top: 5px; font-size: 0.9rem;">Download Updated .txt List</button>
                <p id="add-status" style="font-size: 0.9rem; text-align: center;"></p>
            </div>
        </div>

        <div class="section">
            <h2>Exam Statistics</h2>
            <div class="stats-grid" id="stats-grid">
                <!-- Stats will be loaded here -->
            </div>
            
            <div class="reset-group">
                <select id="reset-grade-select" class="reset-select">
                    <option value="all">All Grades</option>
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                </select>
                <button id="reset-all-btn" class="btn reset-btn" style="margin-top: 0;">Reset Results Summary</button>
            </div>
            <p id="reset-status" style="font-size: 0.8rem; margin-top: 10px; color: #7f8c8d;"></p>
        </div>

        <div class="section">
            <h2>Manage Student Results</h2>
            <div class="form-group">
                <label for="manage-grade-level">Filter by Grade Level</label>
                <select id="manage-grade-level" class="reset-select" onchange="loadStudentResults()">
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                </select>
            </div>
            <div class="results-table-container">
                <table id="results-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Score</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="results-table-body">
                        <!-- Results will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

        <button onclick="logout()" class="btn logout-btn">Logout</button>
        <a href="../index.html" style="display: block; margin-top: 20px; text-align: center; color: #666; text-decoration: none;">Back to Student Portal</a>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script>
        const downloadBtn = document.getElementById('download-btn');
        const downloadListBtn = document.getElementById('download-list-btn');
        const addStudentBtn = document.getElementById('add-student-btn');
        const studentNameInput = document.getElementById('student-name');
        const gradeLevelSelect = document.getElementById('grade-level');
        const addStatus = document.getElementById('add-status');
        const statsGrid = document.getElementById('stats-grid');
        const resetGradeSelect = document.getElementById('reset-grade-select');
        const resetAllBtn = document.getElementById('reset-all-btn');
        const resetStatus = document.getElementById('reset-status');
        const resultsTableBody = document.getElementById('results-table-body');
        const manageGradeLevelSelect = document.getElementById('manage-grade-level');

        function logout() {
            sessionStorage.removeItem('admin_auth');
            window.location.href = 'index.html';
        }

        downloadListBtn.addEventListener('click', async () => {
            const grade = gradeLevelSelect.value;
            const key = "added_students_g" + grade;
            const added = JSON.parse(localStorage.getItem(key) || "[]");
            
            try {
                let existingText = "";
                // Priority 1: Try to fetch from server
                try {
                    const resp = await fetch(`../grade${grade}/students-list.txt?nocache=` + Date.now());
                    if (resp.ok) {
                        existingText = await resp.text();
                    }
                } catch (fetchErr) {
                    console.warn("Fetch failed, attempting local script fallback...");
                }

                // Priority 2: Try to load from local students-list.js if fetch failed
                if (!existingText) {
                    try {
                        // Dynamically load the students-list.js file for the grade
                        const scriptId = `students-list-script-${grade}`;
                        let script = document.getElementById(scriptId);
                        if (!script) {
                            script = document.createElement('script');
                            script.id = scriptId;
                            script.src = `../grade${grade}/students-list.js?nocache=` + Date.now();
                            document.body.appendChild(script);
                            
                            // Wait for script to load
                            await new Promise((resolve, reject) => {
                                script.onload = resolve;
                                script.onerror = reject;
                            });
                        }
                        
                        // Access the global variable (it should be defined by the script)
                        // Note: Grade level scripts all use window.STUDENTS_LIST_DATA
                        if (window.STUDENTS_LIST_DATA) {
                            existingText = window.STUDENTS_LIST_DATA;
                        }
                    } catch (scriptErr) {
                        console.error("Local script fallback failed:", scriptErr);
                    }
                }

                if (!existingText) {
                    throw new Error("Could not load existing student list.");
                }

                const existingNames = existingText.split(/\r?\n/).map(s => s.trim()).filter(s => s.length > 0);
                
                // Combine and remove duplicates
                const allNames = [...existingNames];
                added.forEach(name => {
                    if (!allNames.some(n => n.toLowerCase() === name.toLowerCase())) {
                        allNames.push(name);
                    }
                });
                
                // Create file blob
                const content = allNames.join('\n');
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                
                // Trigger download
                const a = document.createElement('a');
                a.href = url;
                a.download = `students-list.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                addStatus.textContent = "Downloaded! Replace the file in grade" + grade + " folder.";
                addStatus.style.color = "#4caf50";
            } catch (e) {
                console.error("Download list failed:", e);
                addStatus.textContent = "Error: Could not read existing list.";
                addStatus.style.color = "#e74c3c";
            }
        });

        function updateStats() {
            const grades = [7, 8, 9, 10];
            statsGrid.innerHTML = '';
            
            grades.forEach(g => {
                const key = "g" + g + "_scores";
                const raw = localStorage.getItem(key);
                let count = 0;
                if (raw) {
                    try {
                        count = JSON.parse(raw).length;
                    } catch (e) {}
                }
                
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `
                    <h3>${count}</h3>
                    <p>Grade ${g} Examinees</p>
                `;
                statsGrid.appendChild(card);
            });
            loadStudentResults();
        }

        function loadStudentResults() {
            const grade = manageGradeLevelSelect.value;
            const key = "g" + grade + "_scores";
            const raw = localStorage.getItem(key);
            let records = [];
            if (raw) {
                try {
                    records = JSON.parse(raw);
                } catch (e) {}
            }

            resultsTableBody.innerHTML = '';
            if (records.length === 0) {
                resultsTableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No results found for this grade.</td></tr>';
                return;
            }

            records.forEach((r, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.name}</td>
                    <td>${r.score}/${r.total}</td>
                    <td>${new Date(r.datetime).toLocaleString()}</td>
                    <td><button class="delete-btn" onclick="deleteResult('${grade}', ${index}, '${r.name}')">Delete</button></td>
                `;
                resultsTableBody.appendChild(tr);
            });
        }

        window.deleteResult = function(grade, index, name) {
            const confirmMsg = `Are you sure you want to DELETE the result for ${name} in Grade ${grade}? This action cannot be undone.`;
            if (confirm(confirmMsg)) {
                const key = "g" + grade + "_scores";
                let records = JSON.parse(localStorage.getItem(key) || "[]");
                records.splice(index, 1);
                localStorage.setItem(key, JSON.stringify(records));
                updateStats();
                alert(`Result for ${name} deleted successfully.`);
            }
        };

        downloadBtn.addEventListener('click', () => {
            const wb = XLSX.utils.book_new();
            const grades = [7, 8, 9, 10];
            
            grades.forEach(g => {
                const key = "g" + g + "_scores";
                const raw = localStorage.getItem(key);
                let records = [];
                if (raw) {
                    try {
                        records = JSON.parse(raw);
                    } catch (e) {}
                }
                
                const data = records.map(r => ({
                    "Name": r.name,
                    "Score": r.score,
                    "Total": r.total,
                    "Percentage": r.percentage + "%",
                    "Date/Time": new Date(r.datetime).toLocaleString()
                }));
                
                const ws = XLSX.utils.json_to_sheet(data);
                XLSX.utils.book_append_sheet(wb, ws, "grade" + g + "-result");
            });
            
            XLSX.writeFile(wb, "examinees-summary-results.xlsx");
        });

        addStudentBtn.addEventListener('click', () => {
            const name = studentNameInput.value.trim();
            const grade = gradeLevelSelect.value;
            
            if (!name) {
                addStatus.textContent = "Please enter a name.";
                addStatus.style.color = "#e74c3c";
                return;
            }

            // In this client-side environment, we'll store the added students in localStorage
            // for the respective grade level, so they can pass the auth check.
            const key = "added_students_g" + grade;
            let added = JSON.parse(localStorage.getItem(key) || "[]");
            if (!added.some(s => s.toLowerCase() === name.toLowerCase())) {
                added.push(name);
                localStorage.setItem(key, JSON.stringify(added));
                addStatus.textContent = `Successfully added ${name} to Grade ${grade} list!`;
                addStatus.style.color = "#4caf50";
                studentNameInput.value = '';
                
                // Note: The user wanted to "immediately update the respective students-list.txt file".
                // We'll notify them that the local list is updated and they should update the .txt file
                // if they want it to be permanent for all users.
                console.log(`Student added: ${name} to Grade ${grade}`);
            } else {
                addStatus.textContent = "Student already in the list.";
                addStatus.style.color = "#f39c12";
            }
        });

        resetAllBtn.addEventListener('click', () => {
            const target = resetGradeSelect.value;
            let confirmMsg = "";
            let targetLabel = "";

            if (target === "all") {
                confirmMsg = "Are you sure you want to RESET ALL result summaries? This will permanently delete all examinee scores for ALL grade levels. This action cannot be undone.";
                targetLabel = "all grades";
            } else {
                confirmMsg = `Are you sure you want to RESET the result summary for Grade ${target}? This will permanently delete all examinee scores for this grade. This action cannot be undone.`;
                targetLabel = `Grade ${target}`;
            }
            
            if (confirm(confirmMsg)) {
                if (target === "all") {
                    const grades = [7, 8, 9, 10];
                    grades.forEach(g => {
                        localStorage.removeItem("g" + g + "_scores");
                    });
                } else {
                    localStorage.removeItem("g" + target + "_scores");
                }
                
                updateStats();
                resetStatus.textContent = `Successfully cleared results for ${targetLabel}.`;
                resetStatus.style.color = "#4caf50";
                
                // Hide success message after 5 seconds
                setTimeout(() => {
                    resetStatus.textContent = "";
                }, 5000);
            }
        });

        updateStats();
    </script>
</body>
</html>
