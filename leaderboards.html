<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Leaderboards</title>
    <link rel="stylesheet" href="style.css?v=1.1.1">
    <style>
        .leaderboard-container { max-width: 800px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .grade-tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; font-weight: bold; cursor: pointer; color: #666; transition: color 0.3s; }
        .tab-btn.active { color: #2c3e50; border-bottom: 3px solid #3498db; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .leaderboard-table th { background-color: #f8f9fa; color: #2c3e50; }
        .rank { font-weight: bold; width: 50px; }
        .score { font-weight: bold; color: #27ae60; text-align: right; }
        .no-data { text-align: center; padding: 40px; color: #999; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/ulhs-logo.png" alt="School Logo" class="school-logo" />
        <h1>Top Scorers</h1>
        
        <div class="leaderboard-container">
            <div class="grade-tabs">
                <button class="tab-btn active" onclick="loadGrade('7')">Grade 7</button>
                <button class="tab-btn" onclick="loadGrade('8')">Grade 8</button>
                <button class="tab-btn" onclick="loadGrade('8-tle')">G8 TLE</button>
                <button class="tab-btn" onclick="loadGrade('9')">Grade 9</button>
                <button class="tab-btn" onclick="loadGrade('10')">Grade 10</button>
            </div>
            
            <div id="leaderboard-content">
                <!-- Data will be loaded here -->
                <div class="loader"></div>
            </div>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <a href="index.html" class="btn btn-home">Back to Menu</a>
        </div>
    </div>

    <!-- Firebase SDK (Version 8.x) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Local Firebase Configuration and Service -->
    <script src="firebase-config.js?v=1.1.1"></script>
    <script src="firebase-service.js?v=1.1.1"></script>

    <script>
        // Initialize Firebase
        if (typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey !== 'YOUR_API_KEY') {
            firebase.initializeApp(firebaseConfig);
        }

        async function loadGrade(grade) {
            const content = document.getElementById('leaderboard-content');
            content.innerHTML = '<div class="loader"></div>';

            // Update tab styles
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => {
                if (btn.textContent.toLowerCase().includes(grade.replace('-', ' '))) {
                    btn.classList.add('active');
                } else if (grade === '8-tle' && btn.textContent === 'G8 TLE') {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            if (typeof getTopScores !== 'function') {
                content.innerHTML = '<p class="no-data">Error: Firebase Service not loaded.</p>';
                return;
            }

            const scores = await getTopScores(grade, 10);
            
            if (!scores || scores.length === 0) {
                content.innerHTML = '<p class="no-data">No scores recorded yet for this grade.</p>';
                return;
            }

            let html = `
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th class="rank">Rank</th>
                            <th>Student Name</th>
                            <th style="text-align: right;">Score</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            scores.forEach((s, index) => {
                html += `
                    <tr>
                        <td class="rank">#${index + 1}</td>
                        <td>${s.name}</td>
                        <td class="score">${s.score} / ${s.total}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            content.innerHTML = html;
        }

        // Load Grade 7 by default
        document.addEventListener('DOMContentLoaded', () => loadGrade('7'));
    </script>
</body>
</html>
