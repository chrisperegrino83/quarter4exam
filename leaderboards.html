<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Leaderboards</title>
    <link rel="icon" type="image/png" href="assets/ulhs-logo.png">
    <link rel="stylesheet" href="style.css?v=1.3.0">
    <style>
        .leaderboard-container { max-width: 800px; margin: 40px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .grade-tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; font-weight: bold; cursor: pointer; color: #666; transition: color 0.3s; }
        .tab-btn.active { color: #2c3e50; border-bottom: 3px solid #3498db; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .leaderboard-table th, .leaderboard-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .leaderboard-table th { background-color: #f8f9fa; color: #2c3e50; }
        .rank { font-weight: bold; width: 100px; }
        .rank.gold { color: #f1c40f; font-size: 1.2rem; }
        .rank.silver { color: #95a5a6; font-size: 1.1rem; }
        .rank.bronze { color: #cd7f32; font-size: 1.05rem; }
        .score { font-weight: bold; color: #27ae60; text-align: right; }
        .no-data { text-align: center; padding: 40px; color: #999; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="assets/ulhs-logo.png" alt="School Logo" class="school-logo" />
        <h1>Top Scorers</h1>
        
        <div class="leaderboard-container">
            <div class="grade-tabs">
                <button class="tab-btn active" data-grade="7" onclick="loadGrade('7')">G7 VE</button>
                <button class="tab-btn" data-grade="8" onclick="loadGrade('8')">G8 VE</button>
                <button class="tab-btn" data-grade="8-tle" onclick="loadGrade('8-tle')">G8 TLE</button>
                <button class="tab-btn" data-grade="9" onclick="loadGrade('9')">G9 ESP</button>
                <button class="tab-btn" data-grade="10" onclick="loadGrade('10')">G10 ESP</button>
            </div>
            
            <div id="leaderboard-content">
                <!-- Data will be loaded here -->
                <div class="loader"></div>
            </div>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <a href="index.html" class="btn btn-home">Back to Menu</a>
        </div>
    </div>

    <script>
        async function loadGrade(grade) {
            const content = document.getElementById('leaderboard-content');
            content.innerHTML = '<div class="loader"></div>';

            // Update tab styles
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => {
                if (btn.getAttribute('data-grade') === grade) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Local storage fallback for leaderboards
            const key = "g" + grade + "_scores";
            let rawScores = [];
            try {
                const raw = localStorage.getItem(key);
                if (raw) rawScores = JSON.parse(raw);
            } catch (e) {
                console.error("Error reading scores from local storage:", e);
            }

            // Filter for best score per student
            const bestScoresMap = new Map();
            rawScores.forEach(s => {
                const existing = bestScoresMap.get(s.name);
                if (!existing || s.score > existing.score) {
                    bestScoresMap.set(s.name, s);
                } else if (s.score === existing.score) {
                    // If score is equal, take the one with better percentage or earlier date
                    if (new Date(s.datetime) < new Date(existing.datetime)) {
                        bestScoresMap.set(s.name, s);
                    }
                }
            });

            let scores = Array.from(bestScoresMap.values());

            // Sort scores by score descending, then by date ascending (first to get the score)
            scores.sort((a, b) => {
                if (b.score !== a.score) {
                    return b.score - a.score;
                }
                return new Date(a.datetime) - new Date(b.datetime);
            });

            // Limit to top 10
            scores = scores.slice(0, 10);
            
            if (!scores || scores.length === 0) {
                content.innerHTML = '<p class="no-data">No scores recorded yet for this grade.</p>';
                return;
            }

            let html = `
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th class="rank">Rank</th>
                            <th>Student Name</th>
                            <th style="text-align: right;">Score</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            scores.forEach((s, index) => {
                let rankClass = "";
                let trophy = "";
                if (index === 0) {
                    rankClass = "gold";
                    trophy = "🏆";
                } else if (index === 1) {
                    rankClass = "silver";
                    trophy = "🥈";
                } else if (index === 2) {
                    rankClass = "bronze";
                    trophy = "🥉";
                }

                html += `
                    <tr>
                        <td class="rank ${rankClass}">${trophy} #${index + 1}</td>
                        <td>${s.name}</td>
                        <td class="score">${s.score} / ${s.total}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            content.innerHTML = html;
        }

        // Load Grade 7 by default
        document.addEventListener('DOMContentLoaded', () => loadGrade('7'));
    </script>
</body>
</html>
